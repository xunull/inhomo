name: release

# 打 vX.Y.Z tag 触发：各平台原生构建二进制 → 汇总发一个 GitHub Release。
#
# 为何原生矩阵而非跨编译：DuckDB 驱动带各平台预编译静态库（GNU libstdc++ / Apple libc++ ABI），
# zig 跨编译会 `typeinfo` 链接失败，goreleaser 2.17 也无 prebuilt builder。让每个平台在其**原生**
# runner 上用原生工具链构建，与 .a 同 ABI，最稳。仅 tag 事件触发，CI 不自动打 tag（发版 = 手动推 tag）。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 发 Release 需写权限

jobs:
  build:
    name: 构建 ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, goos: darwin, goarch: arm64 }
          - { runner: macos-15-intel, goos: darwin, goarch: amd64 }
          - { runner: ubuntu-24.04, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
    runs-on: ${{ matrix.runner }}
    # tag 经 env 传入、run: 里引号引用，避免把 ${{ github.ref_name }} 直插 shell（防恶意 tag 名注入）。
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 构建前端（go:embed 需要 web/dist）
        run: make deps frontend
      - name: 原生构建（CGO，注入版本）
        run: CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=$TAG" -o inhomo .
      - name: 打包 tar.gz
        run: tar -czf "inhomo_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" inhomo LICENSE README.md
      - uses: actions/upload-artifact@v4
        with:
          name: inhomo_${{ matrix.goos }}_${{ matrix.goarch }}
          path: inhomo_*.tar.gz
          if-no-files-found: error

  release:
    name: 汇总发布 Release
    needs: build
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ github.ref_name }}
      # 对 xunull/homebrew-tap 有 Contents: write 的 fine-grained PAT（本仓库 secret）。
      # 映射成 env 仅为让下方 `if` 能判它是否已配置（secrets 上下文不能直接用于 step 的 if）。
      TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4 # brewgen 需要仓库源码（tools/brewgen）
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: 生成校验和
        run: cd dist && sha256sum -- *.tar.gz > checksums.txt
      - name: 生成 Homebrew formula
        # tools/brewgen 纯 Go（无 CGO / 外部依赖），把 checksums.txt 渲染成 inhomo.rb 一并附到 Release；
        # 随后「同步 formula 到 tap」步再把同一份 inhomo.rb 推进 xunull/homebrew-tap，用户即可 `brew upgrade`。
        run: go run ./tools/brewgen -version "$TAG" -checksums dist/checksums.txt -out dist/inhomo.rb
      - name: 发布 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "$TAG"
          dist/*.tar.gz dist/checksums.txt dist/inhomo.rb
          --repo "${{ github.repository }}"
          --title "$TAG"
          --generate-notes

      # 同步 formula 到 tap：brew 只认 tap 仓库里的 Formula/inhomo.rb（不看 Release 资产），故发完
      # Release 后必须把同一份 inhomo.rb 推进 xunull/homebrew-tap，用户 `brew upgrade` 才看得到新版。
      # 放在发 Release 之后：formula 的 url 指向本 Release 的资产，Release 先在才不会指向 404。
      # 未配置 TAP_PUSH_TOKEN 时下面两步自动跳过（Release 照常发，回退手动覆盖 formula）。
      - name: 检出 tap 仓库
        if: ${{ env.TAP_PUSH_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: xunull/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap
      - name: 同步 formula 到 tap
        if: ${{ env.TAP_PUSH_TOKEN != '' }}
        working-directory: tap
        run: |
          set -euo pipefail
          cp ../dist/inhomo.rb Formula/inhomo.rb
          if git diff --quiet -- Formula/inhomo.rb; then
            echo "formula 无变化，跳过推送"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/inhomo.rb
          git commit -m "inhomo $TAG"
          git push
